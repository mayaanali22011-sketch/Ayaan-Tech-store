<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaFlow Tech Solutions - Products</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-10px) scale(1.01); box-shadow: 0 25px 30px -5px rgba(139, 92, 246, 0.2); border-color: #8b5cf6; }
        .nav-link { position: relative; transition: color 0.3s ease; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -4px; left: 0; background-color: #8b5cf6; transition: width 0.3s ease; }
        .nav-link:hover::after { width: 100%; }
        #cart-modal, #checkout-modal { transition: opacity 0.3s ease, visibility 0.3s ease; opacity: 0; visibility: hidden; }
        #cart-modal.show, #checkout-modal.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 p-6 overflow-x-hidden">

    <div class="max-w-5xl mx-auto space-y-8">
        
        <header class="animate__animated animate__backInDown bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-purple-600">Our Tech Products</h1>
                <p class="text-gray-500 text-sm mt-1">Premium Software Solutions & Enterprise Tools</p>
                <nav class="flex gap-4 mt-4 text-sm font-semibold text-gray-600">
                    <a href="index.html" class="nav-link">🏠 Dashboard</a>
                    <a href="products.html" class="nav-link text-purple-600">📦 Products</a>
                </nav>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-end">
                <div onclick="toggleCartModal(true)" class="relative bg-purple-100 hover:bg-purple-200 text-purple-700 p-3 rounded-xl cursor-pointer transition-all active:scale-95 flex items-center gap-2 font-bold shadow-sm">
                    <span>🛒 Cart</span>
                    <span id="cart-count" class="bg-purple-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
            </div>
        </header>

        <section class="animate__animated animate__fadeInRight bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col sm:flex-row gap-4 items-center justify-between">
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="🔍 Search products..." class="w-full sm:w-64 bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-purple-500">
            <div class="flex gap-2 w-full sm:w-auto">
                <select id="category-filter" onchange="filterProducts()" class="w-1/2 sm:w-auto bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500">
                    <option value="all">All Categories</option>
                    <option value="SaaS Platform">SaaS Platform</option>
                    <option value="Cybersecurity">Cybersecurity</option>
                </select>
                <select id="price-sort" onchange="filterProducts()" class="w-1/2 sm:w-auto bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500">
                    <option value="default">Sort By</option>
                    <option value="low-high">Price: Low to High</option>
                    <option value="high-low">Price: High to Low</option>
                </select>
            </div>
        </section>

        <section id="products-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></section>

        <footer class="bg-gray-100 text-center text-xs text-gray-400 p-4 rounded-xl">
            © 2026 NexaFlow Tech Solutions. Powered by GitHub Pages.
        </footer>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="toggleCartModal(false)">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl transform transition-transform duration-300 translate-y-10" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-xl font-bold text-gray-900">Your Cart</h3>
                <button onclick="toggleCartModal(false)" class="text-gray-400 hover:text-gray-600 font-bold text-xl">&times;</button>
            </div>
            <div id="cart-items" class="space-y-3 max-h-60 overflow-y-auto pr-1"></div>
            <div class="border-t pt-4 mt-4 space-y-4">
                <div class="flex justify-between items-center font-bold text-lg">
                    <span>Total Amount:</span>
                    <span id="cart-total" class="text-purple-600">0 PKR</span>
                </div>
                <button onclick="openCheckoutModal()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl transition-all shadow-md active:scale-95">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 bg-black/50 z-55 flex items-center justify-center p-4" onclick="toggleCheckoutModal(false)">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl transform transition-transform duration-300 translate-y-10" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-xl font-bold text-gray-900">Order Information</h3>
                <button onclick="toggleCheckoutModal(false)" class="text-gray-400 hover:text-gray-600 font-bold text-xl">&times;</button>
            </div>
            <form id="whatsapp-form" onsubmit="sendWhatsAppOrder(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Full Name</label>
                    <input type="text" id="cust-name" required placeholder="John Doe" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Phone Number</label>
                    <input type="tel" id="cust-phone" required placeholder="03001234567" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Delivery / Office Address</label>
                    <textarea id="cust-address" required rows="3" placeholder="Your full deployment or office address..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500 resize-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition-all shadow-md active:scale-95 flex items-center justify-center gap-2">
                    💬 Send Order via WhatsApp
                </button>
            </form>
        </div>
    </div>

    <script>
        const products = [
            { id: "NX-401", title: "CloudSync Dashboard", category: "SaaS Platform", description: "Automate your business data backup across multiple cloud servers with ultra-high encryption.", price: 4999, image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=500" },
            { id: "NX-902", title: "SecureGate VPN", category: "Cybersecurity", description: "Protect your office network and remote employee workstations from malware and phishing attacks.", price: 1500, image: "https://images.unsplash.com/photo-1563986768609-322da13575f3?w=500" }
        ];

        // Advanced local storage caching mechanism
        let cart = JSON.parse(localStorage.getItem('nexaflow_cart')) || [];

        function renderProducts(productsToRender) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            if (productsToRender.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 bg-white rounded-2xl border text-gray-400">No products found.</div>`;
                return;
            }
            productsToRender.forEach((product, index) => {
                const delay = (index * 0.15) + 0.1;
                grid.innerHTML += `
                    <div class="animate__animated animate__fadeInUp bg-white rounded-2xl shadow-sm border border-gray-100 product-card overflow-hidden" style="animation-delay: ${delay}s;">
                        <img src="${product.image}" alt="${product.title}" class="w-full h-48 object-cover">
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-xs font-bold">${product.category}</span>
                                <span class="text-gray-400 text-sm font-medium">ID: #${product.id}</span>
                            </div>
                            <h3 class="text-2xl font-bold text-gray-900">${product.title}</h3>
                            <p class="text-gray-600 text-sm mt-2">${product.description}</p>
                            <div class="mt-6 flex justify-between items-center border-t border-gray-100 pt-4">
                                <div><p class="text-xl font-extrabold text-purple-600">${product.price.toLocaleString()} PKR</p></div>
                                <button onclick="addToCart('${product.id}')" class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold px-4 py-2 rounded-xl transition-all shadow-md active:scale-95">Buy Now</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filterProducts() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            const selectedCategory = document.getElementById('category-filter').value;
            const priceSort = document.getElementById('price-sort').value;
            let filtered = products.filter(p => (p.title.toLowerCase().includes(searchQuery) || p.description.toLowerCase().includes(searchQuery)) && (selectedCategory === 'all' || p.category === selectedCategory));
            if (priceSort === 'low-high') filtered.sort((a, b) => a.price - b.price);
            if (priceSort === 'high-low') filtered.sort((a, b) => b.price - a.price);
            renderProducts(filtered);
        }

        function toggleCartModal(open) {
            const modal = document.getElementById('cart-modal');
            const modalBox = modal.querySelector('div');
            if (open) { modal.classList.add('show'); modalBox.style.transform = "translateY(0)"; }
            else { modalBox.style.transform = "translateY(40px)"; modal.classList.remove('show'); }
        }

        function toggleCheckoutModal(open) {
            const modal = document.getElementById('checkout-modal');
            const modalBox = modal.querySelector('div');
            if (open) { modal.classList.add('show'); modalBox.style.transform = "translateY(0)"; }
            else { modalBox.style.transform = "translateY(40px)"; modal.classList.remove('show'); }
        }

        function openCheckoutModal() {
            if (cart.length === 0) return alert("Your cart is empty!");
            toggleCartModal(false);
            setTimeout(() => toggleCheckoutModal(true), 300);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                cart.push(product);
                updateCartUI();
                const badge = document.getElementById('cart-count');
                badge.className = "bg-purple-600 text-white text-xs font-bold px-2 py-0.5 rounded-full inline-block animate__animated animate__bounceIn";
                badge.addEventListener('animationend', () => { badge.className = "bg-purple-600 text-white text-xs font-bold px-2 py-0.5 rounded-full"; }, {once: true});
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            localStorage.setItem('nexaflow_cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            const totalElement = document.getElementById('cart-total');
            
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-sm text-center py-4">Your cart is currently empty.</p>`;
                totalElement.innerText = `0 PKR`;
                return;
            }

            container.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${item.title}</p>
                            <p class="text-xs text-purple-600 font-semibold">${item.price.toLocaleString()} PKR</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-500 text-xs font-bold bg-red-50 hover:bg-red-100 px-2 py-1 rounded-lg">Remove</button>
                    </div>`;
            });
            totalElement.innerText = `${total.toLocaleString()} PKR`;
        }

        // WhatsApp Custom Form Routing Engine
        function sendWhatsAppOrder(event) {
            event.preventDefault();
            
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const address = document.getElementById('cust-address').value;
            
            // Yahan apna ya client ka WhatsApp number dalein (country code ke sath, bina zeros/plus sign ke)
            const whatsappNumber = "923001234567"; 

            let itemDetails = "";
            let netTotal = 0;
            
            // Map items dynamically to structured string text
            cart.forEach((item, idx) => {
                itemDetails += `${idx + 1}. ${item.title} (%23${item.id}) - ${item.price.toLocaleString()} PKR%0A`;
                netTotal += item.price;
            });

            const message = `*🔥 NEW ORDER RECEIVED - NEXAFLOW* %0A%0A` +
                            `*👤 Customer Details:*%0A` +
                            `Name: ${encodeURIComponent(name)}%0A` +
                            `Phone: ${encodeURIComponent(phone)}%0A` +
                            `Address: ${encodeURIComponent(address)}%0A%0A` +
                            `*📦 Items Ordered:*%0A${itemDetails}%0A` +
                            `*💰 Net Payable:* ${netTotal.toLocaleString()} PKR%0A%0A` +
                            `Please confirm dispatch allocation status.`;

            const url = `https://wa.me/${whatsappNumber}?text=${message}`;
            window.open(url, '_blank');

            // Reset operations
            cart = [];
            updateCartUI();
            document.getElementById('whatsapp-form').reset();
            toggleCheckoutModal(false);
        }

        window.onload = () => { renderProducts(products); updateCartUI(); };
    </script>
</body>
</html>
